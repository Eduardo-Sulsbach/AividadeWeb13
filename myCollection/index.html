<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyCollection Manager</title>
    <meta name="description" content="Gerencie sua coleção de itens com estilo." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-gem">🎬</div>
          <div>
            <div class="logo-title">MyCollection</div>
            <div class="logo-subtitle">Filmes &amp; Séries</div>
          </div>
        </div>

        <div class="stats-panel">
          <div class="stat-card">
            <div class="stat-label">Total de Títulos</div>
            <div class="stat-value" id="stat-total">0</div>
          </div>
          <div class="stat-card stat-repeated">
            <div class="stat-label">Assistidos</div>
            <div class="stat-value" id="stat-repeated">0</div>
          </div>
          <div class="stat-card stat-unique">
            <div class="stat-label">Para Ver</div>
            <div class="stat-value" id="stat-unique">0</div>
          </div>
        </div>
      </div>
    </header>

    <main class="main">

      <section class="form-section">
        <h2 class="section-title">
          <span class="title-icon">+</span>
          Adicionar à Coleção
        </h2>
        <form id="collection-form" class="form" novalidate>
          <div class="form-grid">

            <div class="form-group">
              <label for="item-name">Nome do Título</label>
              <input
                type="text"
                id="item-name"
                placeholder="Ex: Breaking Bad, Interestelar, The Office..."
                autocomplete="off"
              />
            </div>

            <div class="form-group">
              <label for="item-image">URL da Imagem <span class="optional">(opcional)</span></label>
              <input
                type="url"
                id="item-image"
                placeholder="https://exemplo.com/imagem.png"
              />
            </div>

            <div class="form-group">
              <label for="item-rarity">Categoria</label>
              <select id="item-rarity">
                <option value="Filme">🎬 Filme</option>
                <option value="Série">📺 Série</option>
                <option value="Documentário">🎥 Documentário</option>
                <option value="Animação">✏️ Animação</option>
                <option value="Mini-série">🎞️ Mini-série</option>
              </select>
            </div>

            <div class="form-group form-group--center">
              <label class="toggle-label">
                <input type="checkbox" id="item-repeated" />
                <span class="toggle-track">
                  <span class="toggle-thumb"></span>
                </span>
                <span class="toggle-text">Já Assistido</span>
              </label>
            </div>

          </div>

          <div id="form-error" class="form-error" style="display:none"></div>

          <button type="submit" class="btn-add">
            <span class="btn-icon">+</span>
            Adicionar à Coleção
          </button>
        </form>
      </section>

      <section class="search-section">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none">
            <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M13 13l3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <input
            type="search"
            id="search-input"
            placeholder="Buscar na coleção em tempo real..."
          />
        </div>
      </section>

      <section class="cards-section">
        <div id="empty-state" class="empty-state">
          <div class="empty-icon">🎬</div>
          <p class="empty-title">Sua lista está vazia</p>
          <p class="empty-sub">Adicione o primeiro filme ou série usando o formulário acima!</p>
        </div>
        <div id="cards-grid" class="cards-grid"></div>
      </section>

    </main>

    <footer class="footer">
      MyCollection Manager &mdash; Filmes &amp; Séries
    </footer>

    <script src="main.js"></script>
  </body>
</html>
